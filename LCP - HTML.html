                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="font-semibold text-gray-900">{recipient.name}</p>
                                            <p className="text-sm text-gray-600">{recipient.role}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-sm font-semibold text-gray-700">{recipient.access}</p>
                                            <p className="text-xs text-gray-500">Duration: {recipient.duration}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Action Buttons */}
                    <div className="bg-white rounded-xl card-shadow p-6">
                        <div className="flex flex-col md:flex-row gap-4">
                            <button className="flex-1 bg-red-600 text-white py-4 rounded-lg font-semibold hover:bg-red-700 transition">
                                <i data-lucide="x-circle" className="w-5 h-5 inline mr-2"></i>
                                Override & Cancel Disclosure
                            </button>
                            <button className="flex-1 bg-blue-900 text-white py-4 rounded-lg font-semibold hover:bg-blue-800 transition">
                                <i data-lucide="check-circle" className="w-5 h-5 inline mr-2"></i>
                                Confirm Disclosure (Requires MFA)
                            </button>
                        </div>
                        <p className="text-center text-sm text-gray-600 mt-4">
                            All actions are logged in the immutable audit trail
                        </p>
                    </div>
                </div>
            );
        };

        // App Layout with Sidebar
        const AppLayout = ({ children, currentPage, onNavigate }) => {
            const [sidebarOpen, setSidebarOpen] = useState(false);

            const navigation = [
                { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'estate-planner', name: 'Estate Planner', icon: 'file-edit' },
                { id: 'legal', name: 'Legal Documents', icon: 'file-text' },
                { id: 'assets', name: 'Assets & Liabilities', icon: 'building' },
                { id: 'digital', name: 'Digital Life', icon: 'smartphone' },
                { id: 'trusted', name: 'Trusted People', icon: 'users' },
                { id: 'activity', name: 'Activity Monitoring', icon: 'activity' },
                { id: 'triggers', name: 'Trigger Management', icon: 'bell' },
                { id: 'disclosure-preview', name: 'Disclosure Preview', icon: 'eye' },
            ];

            return (
                <div className="min-h-screen bg-gray-50 flex">
                    {/* Sidebar */}
                    <div className={`${sidebarOpen ? 'block' : 'hidden'} md:block w-64 bg-white border-r fixed md:static h-full z-20 overflow-y-auto`}>
                        <div className="p-6 border-b">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-900 rounded-lg flex items-center justify-center">
                                    <i data-lucide="shield" className="w-6 h-6 text-white"></i>
                                </div>
                                <span className="text-lg font-bold text-gray-900">Life Continuity</span>
                            </div>
                        </div>
                        <nav className="p-4">
                            {navigation.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => {
                                        onNavigate(item.id);
                                        setSidebarOpen(false);
                                    }}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition ${
                                        currentPage === item.id
                                            ? 'bg-blue-50 text-blue-900 font-semibold'
                                            : 'text-gray-700 hover:bg-gray-50'
                                    }`}
                                >
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    <span className="text-sm">{item.name}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t mt-auto">
                            <button onClick={() => onNavigate('home')} className="w-full text-sm text-gray-600 hover:text-gray-900 text-left px-4 py-2">
                                Sign Out
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-auto">
                        {/* Top Bar */}
                        <div className="bg-white border-b p-4 flex items-center justify-between md:hidden sticky top-0 z-10">
                            <button onClick={() => setSidebarOpen(!sidebarOpen)}>
                                <i data-lucide={sidebarOpen ? 'x' : 'menu'} className="w-6 h-6"></i>
                            </button>
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-blue-900 rounded-lg flex items-center justify-center">
                                    <i data-lucide="shield" className="w-5 h-5 text-white"></i>
                                </div>
                                <span className="font-bold">Life Continuity</span>
                            </div>
                            <div className="w-6"></div>
                        </div>

                        {/* Page Content */}
                        <div className="p-6 md:p-8 max-w-7xl mx-auto">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isAuthenticated, setIsAuthenticated] = useState(false);

            useEffect(() => {
                lucide.createIcons();
            }, [currentPage]);

            const handleLogin = () => {
                setIsAuthenticated(true);
                setCurrentPage('dashboard');
            };

            const handleSignup = () => {
                setIsAuthenticated(true);
                setCurrentPage('dashboard');
            };

            const handleGetStarted = () => {
                setCurrentPage('signup');
            };

            const handleNavigate = (page) => {
                setCurrentPage(page);
                if (page === 'home') {
                    setIsAuthenticated(false);
                }
            };

            // Public pages
            if (!isAuthenticated) {
                if (currentPage === 'signup') {
                    return <SignupPage onNavigate={handleNavigate} onSignup={handleSignup} />;
                }
                if (currentPage === 'login') {
                    return <LoginPage onNavigate={handleNavigate} onLogin={handleLogin} />;
                }
                if (currentPage === 'pricing') {
                    return <PricingPage onNavigate={handleNavigate} />;
                }
                return <HomePage onNavigate={handleNavigate} onGetStarted={handleGetStarted} />;
            }

            // Authenticated app pages
            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard':
                        return <Dashboard onNavigate={handleNavigate} />;
                    case 'assets':
                        return <AssetsPage />;
                    case 'legal':
                        return <LegalDocumentsPage />;
                    case 'trusted':
                        return <TrustedPeoplePage />;
                    case 'digital':
                        return <DigitalLifePage />;
                    case 'activity':
                        return <ActivityPage />;
                    case 'estate-planner':
                        return <EstatePlannerPage />;
                    case 'triggers':
                        return <TriggersPage />;
                    case 'disclosure-preview':
                        return <DisclosurePreviewPage />;
                    default:
                        return <Dashboard onNavigate={handleNavigate} />;
                }
            };

            return (
                <AppLayout currentPage={currentPage} onNavigate={handleNavigate}>
                    {renderPage()}
                </AppLayout>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
