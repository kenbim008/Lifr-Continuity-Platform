                                    {/* Row 4: Storage + Trigger */}
                                    <div className="flex gap-4">
                                        <div className="px-6 py-4 bg-purple-50 rounded-lg border-2 border-purple-300 flex flex-col items-center gap-1">
                                            <i data-lucide="database" className="w-6 h-6 text-purple-800"></i>
                                            <span className="font-bold text-purple-900">Zero-Knowledge Storage</span>
                                            <span className="text-xs text-purple-700">(Encrypted blobs)</span>
                                        </div>
                                        <div className="px-6 py-4 bg-red-50 rounded-lg border-2 border-red-300 flex flex-col items-center gap-1">
                                            <i data-lucide="bell" className="w-6 h-6 text-red-800"></i>
                                            <span className="font-bold text-red-900">Trigger & Life Signal Service</span>
                                            <span className="text-xs text-red-700">(No vault access)</span>
                                        </div>
                                    </div>
                                    <div className="text-gray-500">↓ On verified trigger</div>
                                    {/* Row 5: Disclosure */}
                                    <div className="px-6 py-4 bg-indigo-50 rounded-lg border-2 border-indigo-300 flex items-center gap-2">
                                        <i data-lucide="eye" className="w-6 h-6 text-indigo-800"></i>
                                        <span className="font-bold text-indigo-900">Conditional Disclosure (MFA-gated, Audit Logged)</span>
                                    </div>
                                </div>
                                <p className="text-center text-sm text-gray-500 mt-6">All links and tabs are functional. Diagram for investor and auditor reference.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // App Layout with Sidebar
        const AppLayout = ({ children, currentPage, onNavigate, country, setCountry, language, setLanguage, t }) => {
            const [sidebarOpen, setSidebarOpen] = useState(false);

            const navigation = [
                { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'estate-planner', name: 'Estate Planner', icon: 'file-edit' },
                { id: 'legal', name: 'Legal Documents', icon: 'file-text' },
                { id: 'assets', name: 'Assets & Liabilities', icon: 'building' },
                { id: 'digital', name: 'Digital Life', icon: 'smartphone' },
                { id: 'trusted', name: 'Trusted People', icon: 'users' },
                { id: 'activity', name: 'Activity Monitoring', icon: 'activity' },
                { id: 'triggers', name: 'Trigger Management', icon: 'bell' },
                { id: 'disclosure-preview', name: 'Disclosure Preview', icon: 'eye' },
                { id: 'security-architecture', name: 'Security & Compliance', icon: 'shield-check' },
            ];

            return (
                <div className="min-h-screen bg-gray-50 flex">
                    {/* Sidebar */}
                    <div className={`${sidebarOpen ? 'block' : 'hidden'} md:block w-64 bg-white border-r fixed md:static h-full z-20 overflow-y-auto`}>
                        <div className="p-6 border-b">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-900 rounded-lg flex items-center justify-center">
                                    <i data-lucide="shield" className="w-6 h-6 text-white"></i>
                                </div>
                                <span className="text-lg font-bold text-gray-900">Life Continuity</span>
                            </div>
                        </div>
                        <nav className="p-4">
                            {navigation.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => {
                                        onNavigate(item.id);
                                        setSidebarOpen(false);
                                    }}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition ${
                                        currentPage === item.id
                                            ? 'bg-blue-50 text-blue-900 font-semibold'
                                            : 'text-gray-700 hover:bg-gray-50'
                                    }`}
                                >
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    <span className="text-sm">{item.name}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t mt-auto">
                            <button onClick={() => onNavigate('home')} className="w-full text-sm text-gray-600 hover:text-gray-900 text-left px-4 py-2">
                                {t ? t('nav_sign_out') : 'Sign Out'}
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-auto">
                        {/* Top Bar */}
                        <div className="bg-white border-b p-4 flex items-center justify-between sticky top-0 z-10">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="md:hidden">
                                    <i data-lucide={sidebarOpen ? 'x' : 'menu'} className="w-6 h-6"></i>
                                </button>
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-blue-900 rounded-lg flex items-center justify-center">
                                        <i data-lucide="shield" className="w-5 h-5 text-white"></i>
                                    </div>
                                    <span className="font-bold text-gray-900">Life Continuity</span>
                                </div>
                            </div>
                            {country != null && setCountry && language != null && setLanguage && t && (
                                <HeaderLocaleBar country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={t} />
                            )}
                        </div>

                        {/* Page Content */}
                        <div className="p-6 md:p-8 max-w-7xl mx-auto">
                            {children}
                        </div>

                        <footer className="bg-gray-900 text-white py-10 mt-8">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                                    <div className="text-sm text-gray-300">
                                        © 2026 Life Continuity. <span className="text-gray-400">Clarity When It Matters.</span>
                                    </div>
                                    <div className="flex flex-wrap gap-x-6 gap-y-2 text-sm">
                                        <button onClick={() => onNavigate('privacy-policy')} className="text-gray-300 hover:text-white transition">Privacy Policy</button>
                                        <button onClick={() => onNavigate('terms-of-service')} className="text-gray-300 hover:text-white transition">Terms</button>
                                        <button onClick={() => onNavigate('legal-disclaimer')} className="text-gray-300 hover:text-white transition">Disclaimer</button>
                                        <button onClick={() => onNavigate('help-center')} className="text-gray-300 hover:text-white transition">Help Center</button>
                                        <button onClick={() => onNavigate('contact-us')} className="text-gray-300 hover:text-white transition">Contact</button>
                                        <button onClick={() => onNavigate('faq')} className="text-gray-300 hover:text-white transition">FAQ</button>
                                        <a href="./LCP%20-%20Production%20Demo.html" className="text-gray-300 hover:text-white transition">Demo</a>
                                        <button onClick={() => onNavigate('affiliate-program')} className="text-[#015DE7] hover:text-white transition">Affiliate Program</button>
                                    </div>
                                </div>
                                <p className="text-xs text-gray-500 mt-4">
                                    <strong>Important:</strong> Life Continuity does not replace, override, or supersede a legally executed Will or estate document.
                                </p>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [userDisplayName, setUserDisplayName] = useState('');
            const [country, setCountry] = useState(() => typeof localStorage !== 'undefined' ? (localStorage.getItem('lcp_country') || 'US') : 'US');
            const [language, setLanguage] = useState(() => typeof localStorage !== 'undefined' ? (localStorage.getItem('lcp_language') || 'en') : 'en');

            useEffect(() => { try { localStorage.setItem('lcp_country', country); } catch (e) {} }, [country]);
            useEffect(() => { try { localStorage.setItem('lcp_language', language); } catch (e) {} }, [language]);
            useEffect(() => { try { document.documentElement.lang = language; } catch (e) {} }, [language]);
            const tLang = (key) => t(key, language);

            useEffect(() => {
                lucide.createIcons();
            }, [currentPage]);

            useEffect(() => {
                const hash = window.location.hash;
                if (hash && currentPage === 'home') {
                    const el = document.querySelector(hash);
                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                }
            }, [currentPage]);

            const handleLogin = () => {
                setUserDisplayName(productionData.user.name || '');
                setIsAuthenticated(true);
                setCurrentPage('dashboard');
            };

            const handleSignup = (name) => {
                setUserDisplayName(name || '');
                productionData.user.name = name || '';
                setIsAuthenticated(true);
                setCurrentPage('dashboard');
            };

            const handleGetStarted = () => {
                setCurrentPage('signup');
            };

            const handleNavigate = (page, hash) => {
                setCurrentPage(page);
                if (hash) window.location.hash = hash;
                if (page === 'home') {
                    setIsAuthenticated(false);
                }
            };

            // Public pages
            if (!isAuthenticated) {
                if (currentPage === 'signup') {
                    return <SignupPage onNavigate={handleNavigate} onSignup={handleSignup} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'login') {
                    return <LoginPage onNavigate={handleNavigate} onLogin={handleLogin} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'pricing') {
                    return <PricingPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'privacy-policy') {
                    return <PrivacyPolicyPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'terms-of-service') {
                    return <TermsOfServicePage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'legal-disclaimer') {
                    return <LegalDisclaimerPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'help-center') {
                    return <HelpCenterPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'contact-us') {
                    return <ContactUsPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'faq') {
                    return <FAQPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                if (currentPage === 'affiliate-program') {
                    return <AffiliateProgramPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                // Guest: rules only. Logged-in: dashboard is handled in renderPage (authenticated).
                if (currentPage === 'security-architecture') {
                    return <SecurityArchitecturePage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                }
                return <HomePage onNavigate={handleNavigate} onGetStarted={handleGetStarted} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
            }

            // Authenticated app pages
            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard':
                        return <Dashboard onNavigate={handleNavigate} userDisplayName={userDisplayName} />;
                    case 'assets':
                        return <AssetsPage />;
                    case 'legal':
                        return <LegalDocumentsPage />;
                    case 'trusted':
                        return <TrustedPeoplePage />;
                    case 'digital':
                        return <DigitalLifePage />;
                    case 'activity':
                        return <ActivityPage />;
                    case 'estate-planner':
                        return <EstatePlannerPage />;
                    case 'triggers':
                        return <TriggersPage />;
                    case 'disclosure-preview':
                        return <DisclosurePreviewPage />;
                    case 'security-architecture':
                        return <SecurityArchitecturePage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} embedded />;
                    case 'privacy-policy':
                        return <PrivacyPolicyPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'terms-of-service':
                        return <TermsOfServicePage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'legal-disclaimer':
                        return <LegalDisclaimerPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'help-center':
                        return <HelpCenterPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'contact-us':
                        return <ContactUsPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'faq':
                        return <FAQPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'affiliate-dashboard':
                        return <AffiliateDashboardPage onNavigate={handleNavigate} isDemo={false} showRules={false} />;
                    case 'affiliate-program':
                        // Authenticated view of rules page
                        return <AffiliateProgramPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    default:
                        return <Dashboard onNavigate={handleNavigate} userDisplayName={userDisplayName} />;
                }
            };

            return (
                <AppLayout currentPage={currentPage} onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang}>
                    {renderPage()}
                </AppLayout>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
