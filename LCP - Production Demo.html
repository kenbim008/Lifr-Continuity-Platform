                            </div>
                        )}
                    </div>
                </div>
            );
        };
        const UpgradePromptPage = ({ featureName, requiredPlan, onNavigate }) => (
            <div className="bg-white rounded-xl card-shadow p-8 max-w-md mx-auto text-center">
                <i data-lucide="lock" className="w-16 h-16 text-amber-500 mx-auto mb-4"></i>
                <h2 className="text-xl font-bold text-gray-900 mb-2">{featureName} requires {requiredPlan}</h2>
                <p className="text-gray-600 text-sm mb-6">Upgrade your plan to access this feature.</p>
                <button onClick={() => onNavigate('dashboard')} className="w-full bg-blue-900 text-white py-3 rounded-lg font-semibold hover:bg-blue-800">Go to Dashboard to Upgrade</button>
            </div>
        );


        // --- Data-minimalist onboarding & estate roadmap ---
        const REGION_LIST = {
            CA: ['Alberta', 'British Columbia', 'Ontario', 'Quebec', 'Manitoba', 'Saskatchewan', 'Nova Scotia', 'New Brunswick', 'Other province/territory'],
            US: ['California', 'Texas', 'New York', 'Florida', 'Illinois', 'Pennsylvania', 'Ohio', 'Georgia', 'Other state'],
            GB: ['England', 'Scotland', 'Wales', 'Northern Ireland'],
            AU: ['New South Wales', 'Victoria', 'Queensland', 'Western Australia', 'Other state/territory']
        };

        const JURISDICTION_CHECKLISTS = {
            'CA-AB': ['Wills and Succession Act (Alberta)', 'Personal directive / enduring power of attorney', 'Adult guardianship & trusteeship', 'Probate filing in Alberta courts'],
            'CA-ON': ['Succession Law Reform Act (Ontario)', 'Power of attorney for property & personal care', 'Estate administration tax', 'Probate application (Certificate of Appointment)'],
            'CA-BC': ['Wills, Estates and Succession Act (BC)', 'Representation agreement', 'Probate in BC Supreme Court'],
            'US-CA': ['California Probate Code', 'Advance health care directive', 'Trust transfer deed (if applicable)'],
            'US-TX': ['Texas Estates Code', 'Medical power of attorney', 'Independent administration options'],
            'US-NY': ['NY Estates, Powers & Trusts Law', 'Health care proxy', 'Surrogate\'s Court filing'],
            'DEFAULT': ['Locate your original Will and POA documents', 'List major financial institutions (names only)', 'Document where proof-of-ownership records live', 'Designate a Navigator with clear access rules']
        };

        const ASSET_CATEGORY_TILES = [
            { id: 'Financial Accounts', icon: 'landmark', desc: 'Banks, brokerages, pensions — names & clues only' },
            { id: 'Physical Valuables', icon: 'home', desc: 'Property, vehicles, collectibles — where to find proof' },
            { id: 'Digital Legacy', icon: 'smartphone', desc: 'Email, social, crypto — routes, not passwords' },
            { id: 'Legal Documents', icon: 'file-text', desc: 'Will, POA, trusts — where originals are held' }
        ];

        const FINANCIAL_INSTITUTIONS = [
            'TD Waterhouse', 'TD Canada Trust', 'RBC', 'BMO', 'Scotiabank', 'CIBC', 'Wealthsimple', 'Questrade',
            'Computershare', 'Fidelity', 'Charles Schwab', 'Vanguard', 'Chase', 'Bank of America', 'Wells Fargo',
            'Other (describe below)'
        ];
        const LEGAL_LOCATIONS = ['Home safe', 'Law firm', 'Bank safety deposit', 'Family member', 'Accountant office', 'Other (describe below)'];
        const DIGITAL_PLATFORMS = ['Gmail / Google', 'Microsoft / Outlook', 'Apple iCloud', 'Facebook / Meta', 'LinkedIn', 'Crypto exchange (name only)', 'Password manager', 'Other (describe below)'];
        const PHYSICAL_VALUABLES = ['Primary residence', 'Vehicle / registration', 'Jewelry or collectibles', 'Rental property', 'Safety deposit box', 'Other (describe below)'];
        const OTHER_SELECT_VALUE = 'Other (describe below)';

        const OWNERSHIP_OPTIONS = ['Personal name', 'Joint with spouse', 'Joint with partner', 'Holding company / corporation', 'Trust', 'Other entity'];

        const LOCATION_TAGS = [
            { id: 'physical_safe', label: 'Physical filing cabinet / safe at home' },
            { id: 'email_inbox', label: 'Personal email inbox (search term)' },
            { id: 'laptop_folder', label: 'Digital folder on my laptop' },
            { id: 'cloud_drive', label: 'Cloud drive (iCloud, Google Drive, etc.)' },
            { id: 'law_firm', label: 'Law firm / advisor office' },
            { id: 'other', label: 'Other (describe below)' }
        ];

        const looksLikeSensitiveData = (text) => {
            const s = (text || '').replace(/\s/g, '');
            if (!s) return null;
            if (/\b\d{3}-\d{2}-\d{4}\b/.test(text)) return 'That looks like a Social Security Number. Please remove it.';
            if (/\b\d{9}\b/.test(s) && s.length <= 11) return 'That looks like a government ID number. Please remove it.';
            if (/\b(?:\d[ -]*?){13,19}\b/.test(text.replace(/\s/g, ' '))) return 'That looks like a credit or card number. List the institution name only.';
            if (/\b\d{10,17}\b/.test(s)) return 'That looks like a bank account number. Do not enter account numbers — use a location clue instead.';
            if (/(?:password|pin|ssn|sin|cvv|secret\s*key|private\s*key|seed\s*phrase)/i.test(text)) return 'Do not store passwords or secrets here. Map where your executor can find them offline.';
            return null;
        };

        const DataGuardBanner = () => (
            <div className="flex items-start gap-3 bg-blue-900 text-white rounded-lg p-4 mb-4">
                <span className="text-xl flex-shrink-0" aria-hidden="true">🔒</span>
                <div>
                    <p className="font-bold text-sm">DATA GUARD ACTIVE</p>
                    <p className="text-xs text-blue-100 mt-1">Do not enter account numbers, passwords, PINs, or SSNs. We only store clues so your family knows where to look.</p>
                </div>
            </div>
        );

        const SensitiveField = ({ label, value, onChange, placeholder, hint, multiline = false, rows = 2 }) => {
            const warning = looksLikeSensitiveData(value);
            const Input = multiline ? 'textarea' : 'input';
            return (
                <div className="mb-4">
                    <label className="block text-sm font-semibold text-gray-700 mb-1">{label}</label>
                    {hint && <p className="text-xs text-gray-500 mb-2">{hint}</p>}
                    <Input
                        type={multiline ? undefined : 'text'}
                        rows={multiline ? rows : undefined}
                        value={value}
                        onChange={(e) => onChange(e.target.value)}
                        placeholder={placeholder}
                        className={`w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent ${warning ? 'border-red-400 bg-red-50' : 'border-gray-300'}`}
                    />
                    {warning && (
                        <p className="text-sm text-red-700 mt-2 flex items-start gap-2">
                            <i data-lucide="alert-triangle" className="w-4 h-4 flex-shrink-0 mt-0.5"></i>
                            Oops! {warning}
                        </p>
                    )}
                </div>
            );
        };

        const getJurisdictionKey = (country, region) => {
            if (!country || !region) return 'DEFAULT';
            const abbr = { Alberta: 'AB', 'British Columbia': 'BC', Ontario: 'ON', Quebec: 'QC', California: 'CA', Texas: 'TX', 'New York': 'NY', Florida: 'FL' };
            const code = abbr[region] || region.slice(0, 2).toUpperCase();
            const key = country + '-' + code;
            return JURISDICTION_CHECKLISTS[key] ? key : 'DEFAULT';
        };

        const syncRoadmapToVault = () => {
            const ob = productionData.onboarding;
            if (!ob) return;
            ob.roadmapEntries.forEach((entry, idx) => {
                const exists = productionData.assets.some(a => a.roadmapId === entry.id);
                if (exists) return;
                productionData.assets.push({
                    id: Date.now() + idx,
                    roadmapId: entry.id,
                    category: entry.category,
                    title: entry.institution || entry.category,
                    value: 0,
                    location: entry.locationClue || entry.locationTags?.join(', ') || 'See estate roadmap',
                    beneficiary: entry.ownership || '—',
                    type: 'Roadmap Only'
                });
            });
            if (ob.navigator && ob.navigator.name) {
                const nav = ob.navigator;
                if (!productionData.trustedPeople.some(p => p.email === nav.email && nav.email)) {
                    productionData.trustedPeople.push({
                        id: Date.now(),
                        name: nav.name,
                        email: nav.email || '',
                        phone: '',
                        role: 'Navigator',
                        accessLevel: nav.permissionTier === 'immediate' ? 'Full Access' : 'Conditional — 7-day switch',
                        verified: false
                    });
                }
            }
            if (ob.digitalKeys && ob.digitalKeys.method) {
                const tier = ob.navigator && ob.navigator.permissionTier;
                productionData.digitalAssets.push({
                    id: Date.now() + 1,
                    platform: 'Password access route',
                    category: 'Digital Keys',
                    instructions: ob.digitalKeys.method === 'manager'
                        ? ('Password manager — emergency kit: ' + (ob.digitalKeys.emergencyKitLocation || 'Not specified'))
                        : ('Written passwords — stored at: ' + (ob.digitalKeys.physicalStorageLocation || 'Not specified')),
                    contact: 'See onboarding roadmap',
                    trigger: tier === 'immediate' ? 'Per Navigator access rules' : '7-day conditional unlock'
                });
            }
        };

        const SecureSetupSummary = ({ ob, onNavigate, onDone }) => {
            const countryName = COUNTRY_LIST.find((c) => c.code === ob.jurisdiction.country)?.name || ob.jurisdiction.country || '—';
            const entries = ob.roadmapEntries || [];
            const dk = ob.digitalKeys || {};
            const nav = ob.navigator || {};
            useEffect(() => { try { lucide.createIcons(); } catch (e) {} }, []);

            return (
                <div className="max-w-2xl mx-auto">
                    <div className="bg-white rounded-xl card-shadow-lg p-8 border-2 border-green-200">
                        <div className="text-center mb-6">
                            <i data-lucide="check-circle" className="w-16 h-16 text-green-600 mx-auto mb-3"></i>
                            <h1 className="text-2xl font-bold text-gray-900">Secure Setup complete</h1>
                            <p className="text-gray-600 text-sm mt-2">Your Estate Roadmap summary — review before sharing with your Navigator.</p>
                        </div>
                        <div className="space-y-4 text-sm">
                            <div className="p-4 bg-gray-50 rounded-lg">
                                <p className="font-semibold text-gray-900 mb-1">Jurisdiction</p>
                                <p className="text-gray-700">{countryName}{ob.jurisdiction.region ? ' / ' + ob.jurisdiction.region : ''}</p>
                            </div>
                            <div className="p-4 bg-gray-50 rounded-lg">
                                <p className="font-semibold text-gray-900 mb-1">Mapped items</p>
                                <p className="text-gray-700">{entries.length} location clue{entries.length !== 1 ? 's' : ''} across your roadmap</p>
                                {entries.length > 0 && (
                                    <ul className="mt-2 list-disc list-inside text-gray-600 max-h-32 overflow-y-auto">
                                        {entries.map((e) => <li key={e.id}>{e.category}: {e.institution || 'Item'}</li>)}
                                    </ul>
                                )}
                            </div>
                            <div className="p-4 bg-gray-50 rounded-lg">
                                <p className="font-semibold text-gray-900 mb-1">Digital keys route</p>
                                <p className="text-gray-700">{dk.method === 'manager' ? 'Password manager — ' + (dk.emergencyKitLocation || 'location not specified') : dk.method === 'written' ? 'Written — ' + (dk.physicalStorageLocation || 'location not specified') : 'Not specified'}</p>
                            </div>
                            <div className="p-4 bg-gray-50 rounded-lg">
                                <p className="font-semibold text-gray-900 mb-1">Navigator</p>
                                <p className="text-gray-700">{nav.name || '—'}{nav.email ? ' · ' + nav.email : ''}</p>
                                <p className="text-xs text-gray-500 mt-1">{nav.permissionTier === 'immediate' ? 'Immediate access' : 'Conditional access (7-day switch)'}</p>
                            </div>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3 mt-8">
                            <button type="button" onClick={() => onNavigate('estate-discovery')} className="flex-1 bg-blue-900 text-white py-3 rounded-lg font-semibold hover:bg-blue-800">View Estate Roadmap</button>
                            <button type="button" onClick={onDone} className="flex-1 border border-gray-300 py-3 rounded-lg font-semibold text-gray-800 hover:bg-gray-50">Go to Dashboard</button>
                        </div>
                        <button type="button" onClick={() => onNavigate('pricing')} className="w-full mt-3 text-sm text-blue-900 font-semibold hover:underline">
                            Upgrade to Estate Vault (Premium) →
                        </button>
                    </div>
                </div>
            );
        };

        const OnboardingFlow = ({ onNavigate, onComplete, setCountry }) => {
            const ob = productionData.onboarding;
            const [showSummary, setShowSummary] = useState(ob.completed && ob.stage >= 5);
            const [stage, setStage] = useState(ob.stage || 1);
            const [assetStep, setAssetStep] = useState(1);
            const [jurisdiction, setJurisdiction] = useState(() => {
                const country = ob.jurisdiction.country || '';
                let region = ob.jurisdiction.region || '';
                const regs = REGION_LIST[country] || [];
                if (country && !region && regs.length > 0) region = regs[0];
                ob.jurisdiction.country = country;
                ob.jurisdiction.region = region;
                return { country, region };
            });
            const [digitalKeys, setDigitalKeys] = useState({
                method: ob.digitalKeys.method || '',
                emergencyKitLocation: ob.digitalKeys.emergencyKitLocation || '',
                physicalStorageLocation: ob.digitalKeys.physicalStorageLocation || ''
            });
            const [navigator, setNavigator] = useState({
                name: ob.navigator.name || '',
                email: ob.navigator.email || '',
                permissionTier: ob.navigator.permissionTier || 'conditional'
            });
            const [draft, setDraft] = useState({
                category: '',
                institution: '',
                customInstitution: '',
                ownership: '',
                ownershipOther: '',
                locationClue: '',
                locationTags: [],
                emailSearchTerm: ''
            });
            const [skippedCategories, setSkippedCategories] = useState(() => [...(ob.skippedCategories || [])]);
            const [saveNotice, setSaveNotice] = useState('');
            const [entriesTick, setEntriesTick] = useState(0);
            const [sensitiveBlock, setSensitiveBlock] = useState(false);
            const bumpEntries = () => setEntriesTick((t) => t + 1);

            const institutionOptionsForCategory = (cat) => {
                if (cat === 'Financial Accounts') return FINANCIAL_INSTITUTIONS;
                if (cat === 'Legal Documents') return LEGAL_LOCATIONS;
                if (cat === 'Digital Legacy') return DIGITAL_PLATFORMS;
                if (cat === 'Physical Valuables') return PHYSICAL_VALUABLES;
                return [];
            };

            const resolveInstitutionLabel = (d) => {
                const isOther = d.institution === OTHER_SELECT_VALUE || d.institution === 'Other (type below)';
                if (isOther) return (d.customInstitution || '').trim();
                return (d.institution || d.customInstitution || '').trim();
            };

            const categoryProgress = ASSET_CATEGORY_TILES.map((tile) => {
                const count = (ob.roadmapEntries || []).filter((e) => e.category === tile.id).length;
                const skipped = skippedCategories.includes(tile.id);
                return { ...tile, count, skipped, complete: count > 0 || skipped };
            }); // entriesTick forces refresh when roadmapEntries mutates
            void entriesTick;
            const categoriesAddressedCount = categoryProgress.filter((c) => c.complete).length;
            const allCategoriesAddressed = categoryProgress.every((c) => c.complete);

            const resetDraft = () => setDraft({
                category: '', institution: '', customInstitution: '', ownership: '', ownershipOther: '',
                locationClue: '', locationTags: [], emailSearchTerm: ''
            });

            const markCategoryNotApplicable = (catId) => {
                const next = [...new Set([...skippedCategories, catId])];
                setSkippedCategories(next);
                ob.skippedCategories = next;
                bumpEntries();
            };

            const unmarkCategorySkipped = (catId) => {
                const next = skippedCategories.filter((id) => id !== catId);
                setSkippedCategories(next);
                ob.skippedCategories = next;
                bumpEntries();
            };

            const removeRoadmapEntry = (id) => {
                ob.roadmapEntries = (ob.roadmapEntries || []).filter((e) => e.id !== id);
                bumpEntries();
            };

            useEffect(() => { try { lucide.createIcons(); } catch (e) {} }, [stage, assetStep, jurisdiction, digitalKeys, navigator, skippedCategories, saveNotice, ob.roadmapEntries?.length]);

            const syncJurisdiction = (next) => {
                setJurisdiction(next);
                ob.jurisdiction.country = next.country;
                ob.jurisdiction.region = next.region;
            };

            const jurisdictionKey = getJurisdictionKey(jurisdiction.country, jurisdiction.region);
            const checklist = JURISDICTION_CHECKLISTS[jurisdictionKey] || JURISDICTION_CHECKLISTS.DEFAULT;
            const regions = REGION_LIST[jurisdiction.country] || [];

            const canProceedAsset = () => {
                if (!draft.category) return false;
                if (assetStep === 2) {
                    const inst = resolveInstitutionLabel(draft);
                    if (!inst) return false;
                    const w = looksLikeSensitiveData(inst);
                    if (w) { setSensitiveBlock(true); return false; }
                    return true;
                }
                if (assetStep === 3) {
                    if (!draft.ownership) return false;
                    if (draft.ownership === 'Other entity' && !(draft.ownershipOther || '').trim()) return false;
                    return true;
                }
                if (assetStep === 4) {
                    const hasOtherTag = draft.locationTags.includes('other');
                    const clue = (draft.locationClue || '').trim();
                    const hasClue = clue || (draft.locationTags.filter((t) => t !== 'other').length > 0);
                    if (!hasClue) return false;
                    if (hasOtherTag && !clue) return false;
                    const w = looksLikeSensitiveData(draft.locationClue) || looksLikeSensitiveData(draft.customInstitution) || looksLikeSensitiveData(resolveInstitutionLabel(draft));
                    if (w) { setSensitiveBlock(true); return false; }
                }
                return true;
            };

            const saveAssetEntry = (addAnotherSameCategory = false) => {
                const inst = resolveInstitutionLabel(draft);
                let clue = draft.locationClue;
                if (draft.locationTags.includes('email_inbox') && draft.emailSearchTerm) {
                    clue = (clue ? clue + ' | ' : '') + "Email search: '" + draft.emailSearchTerm + "'";
                }
                const ownershipLabel = draft.ownership === 'Other entity' && draft.ownershipOther.trim()
                    ? 'Other entity: ' + draft.ownershipOther.trim()
                    : draft.ownership;
                ob.roadmapEntries.push({
                    id: Date.now(),
                    category: draft.category,
                    institution: inst,
                    ownership: ownershipLabel,
                    locationClue: clue,
                    locationTags: [...draft.locationTags]
                });
                if (skippedCategories.includes(draft.category)) unmarkCategorySkipped(draft.category);
                const savedCat = draft.category;
                resetDraft();
                setAssetStep(1);
                setSensitiveBlock(false);
                bumpEntries();
                setSaveNotice(addAnotherSameCategory
                    ? 'Item saved. Add another in ' + savedCat + ' or pick a different category.'
                    : 'Item saved. You can add more items or continue when all four categories are mapped.');
                setTimeout(() => setSaveNotice(''), 6000);
            };

            const finishOnboarding = () => {
                ob.completed = true;
                ob.stage = 5;
                syncRoadmapToVault();
                setShowSummary(true);
            };

            const progressPct = Math.round(((stage - 1) / 4) * 100);

            if (showSummary) {
                return (
                    <SecureSetupSummary
                        ob={ob}
                        onNavigate={onNavigate}
                        onDone={() => { if (onComplete) onComplete(); else onNavigate('dashboard'); }}
                    />
                );
            }

            return (
                <div className="max-w-2xl mx-auto">
                    <div className="mb-6">
                        <div className="flex justify-between text-xs text-gray-500 mb-1">
                            <span>Secure onboarding</span>
                            <span>Stage {stage} of 5</span>
                        </div>
                        <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                            <div className="h-full bg-blue-900 transition-all duration-300" style={{ width: progressPct + '%' }}></div>
                        </div>
                    </div>

                    {stage === 1 && (
                        <div className="bg-white rounded-xl card-shadow-lg p-8 border-2 border-blue-100">
                            <div className="text-center mb-6">
                                <i data-lucide="shield-check" className="w-14 h-14 text-blue-900 mx-auto mb-4"></i>
                                <h1 className="text-2xl font-bold text-gray-900">Privacy Guarantee</h1>
                            </div>
                            <div className="bg-gray-50 border border-gray-200 rounded-xl p-6 text-center mb-6">
                                <p className="text-gray-800 leading-relaxed">
                                    We do <strong>not</strong> want your passwords, bank account numbers, or SSNs.
                                </p>
                                <p className="text-gray-600 mt-3 text-sm">
                                    Our job is to create a secure <strong>roadmap</strong> for your family — not a honey pot for hackers.
                                </p>
                            </div>
                            <ul className="text-sm text-gray-600 space-y-2 mb-8 list-disc list-inside">
                                <li>Never type account numbers — only institution names and location clues</li>
                                <li>Map where documents live, not what's inside them</li>
                                <li>Your Navigator sees directions, not login screens</li>
                            </ul>
                            <button type="button" onClick={() => { ob.stage = 2; setStage(2); }} className="w-full bg-blue-900 text-white py-3 rounded-lg font-semibold hover:bg-blue-800 transition">
                                Let's Begin
                            </button>
                        </div>
                    )}

                    {stage === 2 && (
                        <div className="bg-white rounded-xl card-shadow-lg p-8">
                            <h2 className="text-xl font-bold text-gray-900 mb-2">The Jurisdictional Anchor</h2>
                            <p className="text-gray-600 text-sm mb-6">Where do you currently reside? We tailor your checklist to local estate law — without collecting sensitive IDs.</p>
                            <DataGuardBanner />
                            <div className="mb-4">
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Country</label>
                                <select
                                    value={jurisdiction.country}
                                    onChange={(e) => {
                                        const nextCountry = e.target.value;
                                        const nextRegions = REGION_LIST[nextCountry] || [];
                                        const nextRegion = nextRegions.length > 0 ? nextRegions[0] : '';
                                        syncJurisdiction({ country: nextCountry, region: nextRegion });
                                        if (setCountry) setCountry(nextCountry);
                                    }}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg cursor-pointer bg-white"
                                >
                                    <option value="">Select country</option>
                                    {COUNTRY_LIST.map((c) => <option key={c.code} value={c.code}>{c.name}</option>)}
                                </select>
                            </div>
                            {jurisdiction.country && (
                                <div className="mb-4">
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Province or State</label>
                                    {regions.length > 0 ? (
                                        <select
                                            value={jurisdiction.region}
                                            onChange={(e) => syncJurisdiction({ ...jurisdiction, region: e.target.value })}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg cursor-pointer bg-white"
                                        >
                                            <option value="">Select region</option>
                                            {regions.map((r) => <option key={r} value={r}>{r}</option>)}
                                        </select>
                                    ) : (
                                        <SensitiveField
                                            label="Region"
                                            value={jurisdiction.region}
                                            onChange={(v) => syncJurisdiction({ ...jurisdiction, region: v })}
                                            placeholder="e.g. Alberta, California"
                                            hint="Name only — not a postal code or full address unless you choose to add one later in Estate Planner."
                                        />
                                    )}
                                </div>
                            )}
                            {jurisdiction.country && jurisdiction.region && (
                                <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6">
                                    <p className="text-sm font-semibold text-amber-900 mb-2">Localized checklist prepared</p>
                                    <ul className="text-xs text-amber-800 space-y-1 list-disc list-inside">
                                        {checklist.map((item, i) => <li key={i}>{item}</li>)}
                                    </ul>
                                </div>
                            )}

                                                <tr className="border-b border-gray-100"><td className="py-3 px-4 font-semibold">Key derivation</td><td className="py-3 px-4">Argon2id</td><td className="py-3 px-4">User password → encryption key (memory-hard, configurable cost)</td></tr>
                                                <tr className="border-b border-gray-100"><td className="py-3 px-4 font-semibold">Key storage</td><td className="py-3 px-4">Split-key / HSM-ready</td><td className="py-3 px-4">Recovery key split; optional HSM for key material</td></tr>
                                                <tr className="border-b border-gray-100"><td className="py-3 px-4 font-semibold">Data in transit</td><td className="py-3 px-4">TLS 1.3</td><td className="py-3 px-4">All API and app traffic over TLS 1.3 only</td></tr>
                                                <tr className="border-b border-gray-100"><td className="py-3 px-4 font-semibold">Hashing</td><td className="py-3 px-4">SHA-256 / HMAC</td><td className="py-3 px-4">Integrity and authentication of stored blobs</td></tr>
                                                <tr className="border-b border-gray-100"><td className="py-3 px-4 font-semibold">MFA</td><td className="py-3 px-4">TOTP / WebAuthn</td><td className="py-3 px-4">Second factor for login and disclosure confirmation</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="bg-blue-50 border border-blue-200 rounded-xl p-6">
                                    <p className="text-sm text-blue-900"><strong>Zero-knowledge:</strong> Client-side encryption before upload; server stores only ciphertext. Keys never leave the client except under explicit user action (e.g. recovery flow with split key).</p>
                                </div>
                            </div>
                        )}

                        {/* Architecture Diagram */}
                        {activeTab === 'diagram' && (
                            <div className="bg-white rounded-xl card-shadow p-8 overflow-x-auto">
                                <h2 className="text-2xl font-bold text-gray-900 mb-6">Security Architecture (Investor Overview)</h2>
                                <div className="flex flex-col items-center gap-4 min-w-[800px]" style={{ fontFamily: 'sans-serif' }}>
                                    {/* Row 1: User */}
                                    <div className="flex items-center gap-2 px-6 py-3 bg-blue-100 rounded-lg border-2 border-blue-300">
                                        <i data-lucide="user" className="w-6 h-6 text-blue-900"></i>
                                        <span className="font-bold text-blue-900">User / Executor (Browser or App)</span>
                                    </div>
                                    <div className="text-gray-500">↓ HTTPS (TLS 1.3)</div>
                                    {/* Row 2: API + Auth */}
                                    <div className="flex gap-4">
                                        <div className="px-6 py-4 bg-green-50 rounded-lg border-2 border-green-300 flex items-center gap-2">
                                            <i data-lucide="shield" className="w-6 h-6 text-green-800"></i>
                                            <span className="font-bold text-green-900">Auth & MFA</span>
                                        </div>
                                        <div className="px-6 py-4 bg-gray-100 rounded-lg border-2 border-gray-300 flex items-center gap-2">
                                            <i data-lucide="server" className="w-6 h-6 text-gray-700"></i>
                                            <span className="font-bold text-gray-900">API Gateway</span>
                                        </div>
                                    </div>
                                    <div className="text-gray-500">↓</div>
                                    {/* Row 3: Client-side encrypt */}
                                    <div className="px-6 py-4 bg-amber-50 rounded-lg border-2 border-amber-300 flex items-center gap-2">
                                        <i data-lucide="lock" className="w-6 h-6 text-amber-800"></i>
                                        <span className="font-bold text-amber-900">Client-Side Encryption (AES-256-GCM, Argon2id)</span>
                                    </div>
                                    <div className="text-gray-500">↓ Ciphertext only</div>
                                    {/* Row 4: Storage + Trigger */}
                                    <div className="flex gap-4">
                                        <div className="px-6 py-4 bg-purple-50 rounded-lg border-2 border-purple-300 flex flex-col items-center gap-1">
                                            <i data-lucide="database" className="w-6 h-6 text-purple-800"></i>
                                            <span className="font-bold text-purple-900">Zero-Knowledge Storage</span>
                                            <span className="text-xs text-purple-700">(Encrypted blobs)</span>
                                        </div>
                                        <div className="px-6 py-4 bg-red-50 rounded-lg border-2 border-red-300 flex flex-col items-center gap-1">
                                            <i data-lucide="bell" className="w-6 h-6 text-red-800"></i>
                                            <span className="font-bold text-red-900">Trigger & Life Signal Service</span>
                                            <span className="text-xs text-red-700">(No vault access)</span>
                                        </div>
                                    </div>
                                    <div className="text-gray-500">↓ On verified trigger</div>
                                    {/* Row 5: Disclosure */}
                                    <div className="px-6 py-4 bg-indigo-50 rounded-lg border-2 border-indigo-300 flex items-center gap-2">
                                        <i data-lucide="eye" className="w-6 h-6 text-indigo-800"></i>
                                        <span className="font-bold text-indigo-900">Conditional Disclosure (MFA-gated, Audit Logged)</span>
                                    </div>
                                </div>
                                <p className="text-center text-sm text-gray-500 mt-6">All links and tabs are functional. Diagram for investor and auditor reference.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // App Layout with Sidebar
        const AppLayout = ({ children, currentPage, onNavigate, onLogout, country, setCountry, language, setLanguage, t }) => {
            const [sidebarOpen, setSidebarOpen] = useState(false);
            useEffect(() => {
                try { if (typeof lucide !== 'undefined') lucide.createIcons(); } catch (e) {}
            }, [sidebarOpen]);

            const navigation = [
                { id: 'dashboard', name: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'estate-discovery', name: 'Estate Roadmap', icon: 'map' },
                { id: 'onboarding', name: 'Secure Setup', icon: 'compass' },
                { id: 'pricing', name: 'Pricing', icon: 'tag' },
                { id: 'generate-will', name: 'Generate Will?', icon: 'file-signature' },
                { id: 'affiliate-dashboard', name: 'Affiliate Dashboard', icon: 'gift' },
                { id: 'affiliate-program', name: 'Affiliate Program', icon: 'megaphone' },
                { id: 'estate-planner', name: 'Estate Planner', icon: 'file-edit' },
                { id: 'legal', name: 'Legal Documents', icon: 'file-text' },
                { id: 'assets', name: 'Assets & Liabilities', icon: 'building' },
                { id: 'digital', name: 'Digital Life', icon: 'smartphone' },
                { id: 'trusted', name: 'Trusted People', icon: 'users' },
                { id: 'activity', name: 'Activity Monitoring', icon: 'activity' },
                { id: 'triggers', name: 'Trigger Management', icon: 'bell' },
                { id: 'disclosure-preview', name: 'Disclosure Preview', icon: 'eye' },
                { id: 'security-architecture', name: 'Security & Compliance', icon: 'shield-check' },
            ];

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    <DemoModeBanner />
                    <div className="flex flex-1 min-h-0">
                    {sidebarOpen && (
                        <div className="fixed inset-0 bg-black/40 z-30 md:hidden" onClick={() => setSidebarOpen(false)} aria-hidden="true" />
                    )}
                    {/* Sidebar */}
                    <div className={`${sidebarOpen ? 'block' : 'hidden'} md:block w-64 bg-white border-r fixed inset-y-0 left-0 md:inset-auto md:static z-40 h-screen md:h-full min-h-0 overflow-y-auto`}>
                        <div className="p-6 border-b">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-900 rounded-lg flex items-center justify-center">
                                    <i data-lucide="shield" className="w-6 h-6 text-white"></i>
                                </div>
                                <button type="button" onClick={() => onNavigate('home')} className="text-lg font-bold hover:text-blue-900 transition-colors">
                                    <BrandWordmark />
                                </button>
                            </div>
                        </div>
                        <nav className="p-4">
                            {navigation.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => {
                                        onNavigate(item.id);
                                        setSidebarOpen(false);
                                    }}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition ${
                                        currentPage === item.id
                                            ? 'bg-blue-50 text-blue-900 font-semibold'
                                            : 'text-gray-700 hover:bg-gray-50'
                                    }`}
                                >
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    <span className="text-sm">{item.name}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t mt-auto">
                            <button onClick={() => onLogout && onLogout()} className="w-full text-sm text-gray-600 hover:text-blue-900 transition-colors text-left px-4 py-2">
                                {t ? t('nav_sign_out') : 'Sign Out'}
                            </button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-auto">
                        {/* Top Bar */}
                        <div className="bg-white border-b p-4 flex items-center justify-between sticky top-0 z-50">
                            <div className="flex items-center gap-3">
                                <button type="button" aria-label={sidebarOpen ? 'Close menu' : 'Open menu'} onClick={() => setSidebarOpen(!sidebarOpen)} className="md:hidden p-2 -ml-2 text-gray-800">
                                    <i data-lucide={sidebarOpen ? 'x' : 'menu'} className="w-6 h-6"></i>
                                </button>
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-blue-900 rounded-lg flex items-center justify-center">
                                        <i data-lucide="shield" className="w-5 h-5 text-white"></i>
                                    </div>
                                    <button type="button" onClick={() => onNavigate('home')} className="font-bold hover:text-blue-900 transition-colors">
                                        <BrandWordmark />
                                    </button>
                                </div>
                            </div>
                            {country != null && setCountry && language != null && setLanguage && t && (
                                <HeaderLocaleBar country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={t} />
                            )}
                        </div>

                        {/* Page Content */}
                        <div className="p-6 md:p-8 max-w-7xl mx-auto">
                            {children}
                        </div>

                        <SiteFooter onNavigate={onNavigate} t={t} />
                    </div>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [isAuthenticated, setIsAuthenticated] = useState(true);
            const [userDisplayName, setUserDisplayName] = useState(productionData.user.name || '');
            const [subVersion, setSubVersion] = useState(0);
            const [country, setCountry] = useState(() => typeof localStorage !== 'undefined' ? (localStorage.getItem('lv_country') || 'US') : 'US');
            const [language, setLanguage] = useState(() => typeof localStorage !== 'undefined' ? (localStorage.getItem('lv_language') || 'en') : 'en');

            const handleRestoreSubscription = () => {
                productionData.subscription.status = 'active';
                productionData.subscription.cancelledAt = null;
                productionData.subscription.gracePeriodEndsAt = null;
                setSubVersion(v => v + 1);
            };
            const handleSubscriptionChange = () => { setSubVersion(v => v + 1); };

            useEffect(() => { try { localStorage.setItem('lv_country', country); } catch (e) {} }, [country]);
            useEffect(() => { try { localStorage.setItem('lv_language', language); } catch (e) {} }, [language]);
            useEffect(() => { try { document.documentElement.lang = language; } catch (e) {} }, [language]);
            const tLang = (key) => t(key, language);

            useEffect(() => {
                lucide.createIcons();
            }, [currentPage]);

            useEffect(() => {
                const hash = window.location.hash;
                if (hash && currentPage === 'home') {
                    const el = document.querySelector(hash);
                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                }
            }, [currentPage]);

            const handleLogin = () => {
                setUserDisplayName(productionData.user.name || '');
                setIsAuthenticated(true);
                const dest = (productionData.onboarding && !productionData.onboarding.completed) ? 'onboarding' : 'dashboard';
                setCurrentPage(dest);
            };

            const handleSignup = (name) => {
                setUserDisplayName(name || '');
                productionData.user.name = name || '';
                setIsAuthenticated(true);
                setCurrentPage(productionData.onboarding && !productionData.onboarding.completed ? 'onboarding' : 'dashboard');
            };

            const handleGetStarted = () => {
                setCurrentPage('signup');
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setCurrentPage('home');
            };

            const handleNavigate = (page, hash) => {
                setCurrentPage(page);
                if (hash) window.location.hash = hash;
            };

            const renderWithChat = (content) => (
                <>
                    {content}
                    {currentPage !== 'help-center' && (
                        <ChatBotWidget onNavigate={handleNavigate} currentPage={currentPage} />
                    )}
                </>
            );

            // Public pages
            if (!isAuthenticated) {
                if (currentPage === 'signup') {
                    return renderWithChat(<SignupPage onNavigate={handleNavigate} onSignup={handleSignup} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'login') {
                    return renderWithChat(<LoginPage onNavigate={handleNavigate} onLogin={handleLogin} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'pricing') {
                    return renderWithChat(<PricingPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'privacy-policy') {
                    return renderWithChat(<PrivacyPolicyPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'terms-of-service') {
                    return renderWithChat(<TermsOfServicePage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'legal-disclaimer') {
                    return renderWithChat(<LegalDisclaimerPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'price-package-explained') {
                    return renderWithChat(<PricePackageExplainedPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'help-center') {
                    return renderWithChat(<HelpCenterPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'contact-us') {
                    return renderWithChat(<ContactUsPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'faq') {
                    return renderWithChat(<FAQPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'plan-checklist') {
                    return renderWithChat(<PlanChecklistPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                if (currentPage === 'generate-will') {
                    return renderWithChat(<GenerateWillPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} isAuthenticated={false} />);
                }
                if (currentPage === 'affiliate-program') {
                    return renderWithChat(<AffiliateProgramPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                // Guest: rules only. Logged-in: dashboard is handled in renderPage (authenticated).
                if (currentPage === 'security-architecture') {
                    return renderWithChat(<SecurityArchitecturePage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
                }
                return renderWithChat(<HomePage onNavigate={handleNavigate} onGetStarted={handleGetStarted} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
            }

            // Authenticated app pages - check subscription access
            const sub = productionData.subscription;
            if (sub && sub.status === 'permanently_disabled') {
                return renderWithChat(<PermanentlyDisabledScreen onNavigate={handleNavigate} />);
            }
            if (sub && sub.status === 'cancelled') {
                return renderWithChat(<AccessRevokedScreen onNavigate={handleNavigate} onRestore={handleRestoreSubscription} />);
            }
            if (currentPage === 'home') {
                return renderWithChat(<HomePage onNavigate={handleNavigate} onGetStarted={handleGetStarted} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />);
            }

            const gatePage = (pageId, PageComponent, props = {}) => {
                const required = FEATURE_PLANS[pageId] || 'Basic';
                if (!hasActiveSubscription()) {
                    return <SubscribeRequiredScreen onNavigate={handleNavigate} onSubscribed={() => { setCurrentPage('dashboard'); handleSubscriptionChange(); }} pendingPlanHint={required} />;
                }
                if (!canAccessFeature(pageId)) {
                    const name = FEATURE_NAMES[pageId] || pageId;
                    return <UpgradePromptPage featureName={name} requiredPlan={required} onNavigate={handleNavigate} />;
                }
                return <PageComponent {...props} />;
            };
            const renderPage = () => {
                if (currentPage === 'onboarding') {
                    return <OnboardingFlow onNavigate={handleNavigate} onComplete={() => setCurrentPage('estate-discovery')} setCountry={setCountry} />;
                }
                if (currentPage === 'estate-discovery') {
                    return <EstateDiscoveryDirectory onNavigate={handleNavigate} />;
                }
                switch (currentPage) {
                    case 'dashboard':
                        return <Dashboard onNavigate={handleNavigate} userDisplayName={userDisplayName} onSubscriptionChange={handleSubscriptionChange} />;

                    case 'pricing':
                        return <PricingPage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} embeddedInApp={true} onChoosePlanSubscribe={(planName) => { productionData.subscription.pendingCheckoutPlan = planName; setCurrentPage('subscribe-checkout'); }} />;
                    case 'subscribe-checkout':
                        return <SubscribeRequiredScreen onNavigate={handleNavigate} onSubscribed={() => { setCurrentPage('dashboard'); handleSubscriptionChange(); }} />;
                    case 'assets':
                        return gatePage('assets', AssetsPage, { onNavigate: handleNavigate });
                    case 'legal':
                        return gatePage('legal', LegalDocumentsPage);
                    case 'trusted':
                        return gatePage('trusted', TrustedPeoplePage);
                    case 'digital':
                        return gatePage('digital', DigitalLifePage);
                    case 'activity':
                        return gatePage('activity', ActivityPage);
                    case 'estate-planner':
                        return gatePage('estate-planner', EstatePlannerPage);
                    case 'triggers':
                        return gatePage('triggers', TriggersPage, { onNavigate: handleNavigate });
                    case 'disclosure-preview':
                        return gatePage('disclosure-preview', DisclosurePreviewPage);
                    case 'security-architecture':
                        return <SecurityArchitecturePage onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} embedded />;
                    case 'privacy-policy':
                        return <PrivacyPolicyPage hideFooter onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'terms-of-service':
                        return <TermsOfServicePage hideFooter onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'legal-disclaimer':
                        return <LegalDisclaimerPage hideFooter onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'price-package-explained':
                        return <PricePackageExplainedPage hideFooter onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'help-center':
                        return <HelpCenterPage embeddedInApp onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'contact-us':
                        return <ContactUsPage hideFooter onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'faq':
                        return <FAQPage hideFooter onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'plan-checklist':
                        return <PlanChecklistPage hideFooter onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    case 'generate-will':
                        return gatePage('generate-will', GenerateWillPage, { onNavigate: handleNavigate, country, setCountry, language, setLanguage, t: tLang, isAuthenticated: true });
                    case 'affiliate-dashboard':
                        return gatePage('affiliate-dashboard', AffiliateDashboardPage, { onNavigate: handleNavigate, isDemo: true, showRules: false });
                    case 'affiliate-program':
                        // Authenticated view of rules page
                        return <AffiliateProgramPage hideFooter onNavigate={handleNavigate} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang} />;
                    default:
                        return <Dashboard onNavigate={handleNavigate} userDisplayName={userDisplayName} />;
                }
            };

            return renderWithChat((
                <AppLayout currentPage={currentPage} onNavigate={handleNavigate} onLogout={handleLogout} country={country} setCountry={setCountry} language={language} setLanguage={setLanguage} t={tLang}>
                    {renderPage()}
                </AppLayout>
            ));
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
